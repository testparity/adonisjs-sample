settings:
  namespace_roots:
    app: App
    tests: Tests
  source_extension: ".ts"
  test_suffix: ".spec"
  test_extension: ".ts"
  namespace_separator: "."

coverage_xml: parity-coverage.json
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "AdonisJS Services"
    paths:
      source: "app/services"
      test: "tests/unit/services"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
